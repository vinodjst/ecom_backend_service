spring.application.name=ecom
server.port=8081




spring.datasource.url=jdbc:mysql://localhost:3306/ecomstore
spring.datasource.username=root
spring.datasource.password=root
# Explicitly defining the driver is often optional in Boot 3 if the URL is correct,
# but keeping it ensures the correct class is targeted:
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Let Hibernate 6 handle the dialect automatically
spring.jpa.hibernate.ddl-auto=update